<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みんなのギャラリー - アートチャレンジ</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background: radial-gradient(circle at top center, #ffffff 40%, #e5e2dc 100%);
      color: #444;
    }

    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      background: #f9f6f0;
      border-bottom: 1px solid #ccc;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      margin-bottom: 0.3rem;
    }

    .description {
      text-align: center;
      color: #666;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .gallery-room {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 3rem;
      padding: 2rem;
    }

    .artwork-display {
      text-align: center;
      animation: fadeIn 1.5s ease-in-out;
    }

    .artwork-frame {
      padding: 14px;
      border: 14px solid #bda98c;
      background-color: #f4eee2;
      border-radius: 10px;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.2), 0 3px 10px rgba(0,0,0,0.3);
      position: relative;
    }

    .artwork-frame img {
      display: block;
      width: 100%;
      border: 4px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .delete-button {
      margin-top: 0.5rem;
      padding: 6px 12px;
      font-size: 0.9rem;
      background-color: #d44;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .delete-button:hover {
      background-color: #b22;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #f9f6f0;
      border-top: 1px solid #ccc;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <h1>みんなのギャラリー</h1>
  </header>

  <main>
    <section class="description">
      <p>ユーザーが再現した名画がここに集まるよ。不要な画像は削除もできるよ。</p>
    </section>

    <section class="gallery-room" id="gallery-container">
      <!-- JSで画像が追加されます -->
    </section>
  </main>

  <footer>
    <a href="index.html">トップへ戻る</a>
  </footer>

  <script>
    const container = document.getElementById('gallery-container');
    let images = JSON.parse(localStorage.getItem('galleryImages')) || [];

    function renderGallery() {
      container.innerHTML = '';
      images.forEach((src, index) => {
        const div = document.createElement('div');
        div.className = 'artwork-display';

        const frame = document.createElement('div');
        frame.className = 'artwork-frame';

        const img = document.createElement('img');
        img.src = src;

        const btn = document.createElement('button');
        btn.className = 'delete-button';
        btn.textContent = '削除';
        btn.onclick = () => {
          if (confirm('この画像を削除しますか？')) {
            images.splice(index, 1);
            localStorage.setItem('galleryImages', JSON.stringify(images));
            renderGallery();
          }
        };

        frame.appendChild(img);
        div.appendChild(frame);
        div.appendChild(btn);
        container.appendChild(div);
      });
    }

    renderGallery();
  </script>
</body>
</html>

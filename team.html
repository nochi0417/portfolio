<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みんなで名画 - アートチャレンジ</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background-color: #f5f2ea;
      font-family: "Hiragino Kaku Gothic ProN", sans-serif;
      color: #333;
    }

    header, footer {
      text-align: center;
      background-color: #e8e6d6;
      padding: 1rem;
      border-bottom: 2px solid #ccc;
    }

    main {
      max-width: 960px;
      margin: auto;
      padding: 1rem;
    }

    .artwork-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 3rem;
  margin: 2rem 0;
}


    .artwork-card {
      background: #fffdf8;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 0.5rem;
      text-align: center;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .artwork-card:hover {
      transform: scale(1.03);
    }

    .artwork-card img.artwork-frame {
      width: 100%;
      height: auto;
      border: 15px solid #d1bfa3;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      background: linear-gradient(145deg, #f0e5d8, #e6d8c5);
    }

    .filter-toggle {
      text-align: center;
      margin: 1rem 0;
    }

    .camera-section, .filter-section {
      display: none;
      text-align: center;
      padding: 1rem;
      background: #fefcf9;
      border-radius: 12px;
      margin-top: 2rem;
    }

    .spotlight {
      background: radial-gradient(circle at center, rgba(255,255,255,0.9), rgba(0,0,0,0.1));
      box-shadow: inset 0 0 120px rgba(255,255,255,0.4);
    }

    .fade-in {
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .filter-preview {
      border: 15px solid #eee;
      padding: 5px;
      border-image: url('images/frame_border.png') 30 stretch;
      margin-top: 1rem;
    }

    .style-select button {
      margin: 0.5rem;
      padding: 0.5rem 1rem;
      border: none;
      background-color: #e8e6d6;
      border-radius: 5px;
      cursor: pointer;
    }

    .filter-buttons {
      margin-top: 1rem;
    }

    .filter-buttons button {
      margin: 0.3rem;
    }

    #reference-image {
      max-height: 150px;
      margin-bottom: 10px;
      border: 10px solid #ccc;
      background: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>みんなで名画</h1>
    <p>友達や家族と一緒に名画を再現しよう！</p>
  </header>

  <main>
    <section class="filter-toggle">
      <button onclick="filterByPeople('all')">すべて</button>
      <button onclick="filterByPeople('2')">2人用</button>
      <button onclick="filterByPeople('3+')">3人以上</button>
    </section>

    <section class="artwork-selection fade-in">
      <h2>1. 名画を選ぼう</h2>
      <div class="artwork-grid">
        <div class="artwork-card" data-people="2">
          <img src="images/arasi.jpg" alt="ストーム" class="artwork-frame">
          <p><strong>ストーム</strong><br>ピエール＝オーギュスト・コット（フランス）<br>嵐から逃れる2人のロマンチックな場面。</p>
          <button onclick="selectArtwork('images/arasi.jpg')">選択</button>
        </div>

        <div class="artwork-card" data-people="2">
          <img src="images/vinus.jpg" alt="ヴィーナスとアドニス" class="artwork-frame">
          <p><strong>ヴィーナスとアドニス</strong><br>ピーテル・パウル・ルーベンス（フランドル）<br>愛と悲劇の神話を情熱的に描く。</p>
          <button onclick="selectArtwork('images/vinus.jpg')">選択</button>
        </div>

        <div class="artwork-card" data-people="2">
          <img src="images/hutari.jpg" alt="二人の女性" class="artwork-frame">
          <p><strong>二人の女性</strong><br>ポール・ゴーギャン（フランス）<br>タヒチでの女性たちの静かな構図。</p>
          <button onclick="selectArtwork('images/hutari.jpg')">選択</button>
        </div>

        <div class="artwork-card" data-people="3+">
          <img src="images/musuko.jpg" alt="ウゴリーノとその息子たち" class="artwork-frame">
          <p><strong>ウゴリーノとその息子たち</strong><br>ジャン＝バティスト・カルポー（フランス）<br>神曲に基づく飢えと苦悩の劇的な彫刻。</p>
          <button onclick="selectArtwork('images/musuko.jpg')">選択</button>
        </div>
      </div>
    </section>

    <section class="camera-section spotlight fade-in" id="camera-section">
      <h2>2. カメラで撮影しよう</h2>
      <img id="reference-image" src="" alt="参考画像">
      <video id="video" autoplay playsinline></video>
      <br>
      <button onclick="switchCamera()">カメラ切替</button>
      <button onclick="takePhoto()">撮影</button>
    </section>

    <section class="filter-section spotlight fade-in" id="filter-section">
      <h2>3. 加工スタイルを選ぼう</h2>
      <div class="style-select">
        <button onclick="applyStyle('vermeer')">フェルメール風</button>
        <button onclick="applyStyle('vangogh')">ゴッホ風</button>
        <button onclick="applyStyle('monet')">モネ風</button>
        <button onclick="applyStyle('sculpture')">彫刻風</button>
      </div>
      <canvas id="canvas" class="filter-preview"></canvas>
      <div class="filter-buttons">
        <button onclick="downloadImage()">画像を保存</button>
        <button onclick="saveToGallery()">ギャラリーに追加</button>
        <a href="gallery.html">ギャラリーを見る</a>
      </div>
    </section>
  </main>

  <footer>
    <a href="index.html">トップへ戻る</a>
  </footer>

  <script>
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let usingFrontCamera = true;
    let selectedArtworkSrc = '';

    function filterByPeople(num) {
      const cards = document.querySelectorAll('.artwork-card');
      cards.forEach(card => {
        card.style.display = (num === 'all' || card.dataset.people === num) ? 'block' : 'none';
      });
    }

    function selectArtwork(src) {
      selectedArtworkSrc = src;
      document.querySelector('.artwork-selection').style.display = 'none';
      const camSec = document.getElementById('camera-section');
      camSec.style.display = 'block';
      camSec.classList.add('fade-in');
      document.getElementById('reference-image').src = src;
      navigator.mediaDevices.getUserMedia({ video: { facingMode: usingFrontCamera ? 'user' : 'environment' } })
        .then(stream => {
          video.srcObject = stream;
        });
    }

    function switchCamera() {
      usingFrontCamera = !usingFrontCamera;
      video.srcObject.getTracks().forEach(track => track.stop());
      selectArtwork(selectedArtworkSrc);
    }

    function takePhoto() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      document.getElementById('camera-section').style.display = 'none';
      const filterSec = document.getElementById('filter-section');
      filterSec.style.display = 'block';
      filterSec.classList.add('fade-in');
    }

    function applyStyle(style) {
      switch(style) {
        case 'vermeer':
          canvas.style.filter = 'contrast(1.1) saturate(0.8) hue-rotate(-20deg)';
          break;
        case 'vangogh':
          canvas.style.filter = 'contrast(1.3) saturate(1.8) hue-rotate(10deg)';
          break;
        case 'monet':
          canvas.style.filter = 'blur(2px) brightness(1.1) saturate(1.2)';
          break;
        case 'sculpture':
          canvas.style.filter = 'grayscale(1) contrast(1.2)';
          break;
        default:
          canvas.style.filter = 'none';
      }
    }

    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'my_team_art.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    function saveToGallery() {
      let gallery = JSON.parse(localStorage.getItem('galleryImages') || '[]');
      gallery.push(canvas.toDataURL());
      localStorage.setItem('galleryImages', JSON.stringify(gallery));
      alert('ギャラリーに保存されました！');
    }
  </script>
</body>
</html>
